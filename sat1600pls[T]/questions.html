<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>tim is tuff</title>
  <link rel="icon" type="image/png" href="MYsatlogo.png">
  <link rel="shortcut icon" type="image/png" href="MYsatlogo.png">
  <link rel="apple-touch-icon" href="MYsatlogo.png">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Source+Serif+4:ital,opsz,wght@0,8..60,400;0,8..60,600;1,8..60,400&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap');
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #f5f4f0; --surface: #fff; --border: #d8d5ce; --border-light: #ece9e2;
      --text: #1a1a1a; --text-muted: #6b6760; --text-light: #9b9690;
      --accent: #1a3a5c; --accent-light: #e8eff7;
      --correct: #08c0308e; --correct-bg: #eaf4ee; --correct-border: #02912b;
      --incorrect: #fd000086; --incorrect-bg: #faf0f0; --incorrect-border: #da00008f;
      --serif: 'Source Serif 4', Georgia, serif;
      --sans: 'IBM Plex Sans', system-ui, sans-serif;
    }
    html, body { height: 100%; overflow: hidden; }
    body { font-family: var(--sans); display: flex; flex-direction: column; background: var(--surface); color: var(--text); }

    .header { background: var(--accent); height: 56px; display: flex; align-items: center; justify-content: space-between; padding: 0 24px; flex-shrink: 0; }
    .header-left { display: flex; align-items: center; gap: 14px; }
    .header-back { color: rgba(255,255,255,0.75); font-size: 13px; text-decoration: none; padding: 5px 10px; border-radius: 5px; border: 1px solid rgba(255,255,255,0.2); transition: all 0.15s; }
    .header-back:hover { background: rgba(255,255,255,0.12); color: white; }
    .header-section { font-size: 15px; font-weight: 600; color: white; }
    .header-right { display: flex; align-items: center; gap: 8px; }
    .calc-btn { display: flex; align-items: center; gap: 6px; background: rgba(255,255,255,0.12); color: white; border: 1px solid rgba(255,255,255,0.2); border-radius: 5px; padding: 5px 12px; font-size: 12.5px; font-weight: 500; cursor: pointer; transition: background 0.15s; }
    .calc-btn:hover { background: rgba(255,255,255,0.22); }

    .dashed { border: none; border-top: 2px dashed #ccc; flex-shrink: 0; width: 100%; margin: 0; }
    .content > .passage-panel + .question-panel { border-left: 1.5px solid #e0ddd7; }
    .content { flex: 1; display: flex; overflow: hidden; }

    /* LEFT PANEL */
    .passage-panel { flex: 0 0 50%; width: 50%; overflow-y: auto; padding: 40px 52px; min-width: 0; border-right: 1.5px solid #e0ddd7; }
    .question-panel { flex: 0 0 50%; width: 50%; min-width: 0; display: flex; flex-direction: column; overflow: hidden; }
    .question-panel.single { flex: 1; width: 100%; overflow-y: auto; }
    .content { flex: 1; display: flex; overflow: hidden; border-top: none; }
    .passage-panel + .question-panel { border-left: 1.5px solid #e0ddd7; }
    .passage-text { font-family: var(--serif); font-size: 16px; line-height: 1.85; color: var(--text); max-width: 100%; overflow-x: auto; text-align: left; }
    .passage-text figure, .passage-text p:has(svg), .passage-text p:has(img) { text-align: center; }
    .passage-text p { margin-bottom: 14px; }
    .passage-text p:last-child { margin-bottom: 0; }
    .passage-text figure { margin: 16px 0; text-align: center; }
    .passage-text img { max-width: 100%; height: auto; }
    .passage-text svg { max-width: 100%; height: auto; display: block; margin: 0 auto; }
    .passage-text table, .question-stem table { border-collapse: collapse; margin: 12px auto; font-family: var(--serif); font-size: 15px; }
    .passage-text th, .passage-text td, .question-stem th, .question-stem td { border: 1px solid #bbb; padding: 6px 18px; text-align: center; }
    .passage-text th, .question-stem th { background: #f0eeea; font-weight: 600; }

    /* RIGHT PANEL */
    .qnum-bar { display: flex; align-items: center; justify-content: space-between; padding: 10px 24px; border-bottom: 1px solid var(--border-light); background: #faf9f7; flex-shrink: 0; }
    .qnum-left { display: flex; align-items: center; gap: 10px; }
    .qnum-box { width: 30px; height: 30px; background: var(--accent); color: white; border-radius: 5px; display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 700; transition: background 0.2s; }
    .mark-review { display: flex; align-items: center; gap: 6px; font-size: 12.5px; color: var(--text-muted); cursor: pointer; padding: 4px 8px; border-radius: 5px; transition: background 0.15s; user-select: none; }
    .mark-review:hover { color: var(--accent); background: rgba(0,0,0,0.05); }
    .mark-review.marked { color: #f5a623; background: rgba(245,166,35,0.1); font-weight: 600; }
    .diff-badge { font-size: 10.5px; font-weight: 600; padding: 2px 8px; border-radius: 4px; text-transform: uppercase; }
    .diff-E { background: #e8f5ec; color: #1a6b3a; }
    .diff-M { background: #fff4e0; color: #8b5e00; }
    .diff-H { background: #fdeaea; color: #8b1a1a; }
    .topic-tag { font-size: 11.5px; color: var(--text-light); font-style: italic; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 200px; }
    .retry-btn { padding: 10px 28px; background: transparent; color: var(--accent); border: 1.5px solid var(--accent); border-radius: 6px; font-family: var(--sans); font-size: 14px; font-weight: 500; cursor: pointer; transition: all 0.15s; align-self: center; width: fit-content; }
    .retry-btn:hover { background: var(--accent-light); }
    .action-area.centered .retry-btn { align-self: center; }

    /* BODY — two modes */
    .question-body { flex: 1; min-height: 0; overflow-y: auto; padding: 24px 24px 12px; display: flex; flex-direction: column; gap: 18px; }
    .question-body.centered { align-items: center; padding-top: 24px; flex: 0 1 auto; overflow: visible; }
    .question-body.centered > * { width: 100%; max-width: 640px; }
    .question-stem { font-family: var(--serif); font-size: 16px; line-height: 1.75; color: var(--text); }
    .question-stem p { margin-bottom: 8px; }
    /* centered qnum bar sits in content flow */
    .qnum-bar.inline { background: #faf9f7; border: 1px solid var(--border-light); border-radius: 8px; padding: 10px 16px; margin-bottom: 2px; }

    /* CHOICES */
    .choices-list { display: flex; flex-direction: column; gap: 9px; }
    .choice { display: flex; align-items: center; gap: 12px; padding: 11px 14px; border: 1.5px solid #d0cdc7; border-radius: 6px; cursor: pointer; transition: all 0.12s; background: var(--surface); position: relative; }
    .choice:hover:not(.disabled) { border-color: #4a7ab5; background: #f0f5fb; }
    .choice.selected  { border-color: var(--accent); background: #eaf0f8; }
    .choice.correct   { border-color: var(--correct-border); background: var(--correct-bg); }
    .choice.incorrect { border-color: var(--incorrect-border); background: var(--incorrect-bg); }
    .choice.disabled  { cursor: default; }
    .choice.crossed   { opacity: 0.38; }
    .choice.crossed .choice-text { text-decoration: line-through; text-decoration-color: var(--text); text-decoration-thickness: 1px; }
    .choice-letter { width: 28px; height: 28px; min-width: 28px; border-radius: 50%; border: 1.5px solid #aaa; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 600; color: var(--text-muted); transition: all 0.12s; flex-shrink: 0; }
    .choice.selected  .choice-letter { background: var(--accent);    border-color: var(--accent);    color: white; }
    .choice.correct   .choice-letter { background: var(--correct);   border-color: var(--correct);   color: white; }
    .choice.incorrect .choice-letter { background: var(--incorrect); border-color: var(--incorrect); color: white; }
    .choice-text { font-family: var(--serif); font-size: 15.5px; line-height: 1.5; color: var(--text); flex: 1; overflow: hidden; }
    /* cross-out button */
    .cross-btn { width: 22px; height: 22px; min-width: 22px; border-radius: 50%; border: 1.5px solid transparent; background: transparent; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 13px; font-weight: 700; line-height: 1; color: transparent; transition: all 0.12s; flex-shrink: 0; }
    .choice:hover .cross-btn { color: #bbb; border-color: #ccc; }
    .choice.crossed .cross-btn { color: var(--text-muted); border-color: var(--text-muted); background: #ece9e2; }
    .choice.disabled .cross-btn { display: none; }

    .action-area { padding: 16px 24px 20px; flex-shrink: 0; display: flex; flex-direction: column; gap: 14px; }
    .action-area.centered { align-items: center; display: flex; flex-direction: column; gap: 14px; }
    .action-area.centered > * { width: 100%; max-width: 640px; }
    .action-area.centered .retry-btn { align-self: center; width: fit-content; max-width: none; }
    .action-area.centered .rationale-box { width: 100%; max-width: 640px; }
    .submit-btn { padding: 10px 28px; background: var(--accent); color: white; border: none; border-radius: 6px; font-family: var(--sans); font-size: 14px; font-weight: 500; cursor: pointer; transition: opacity 0.15s; align-self: flex-end; }
    .action-area.centered .submit-btn { align-self: center; padding: 10px 48px; }
    .action-area.centered { padding-top: 8px; }
    .submit-btn:hover:not(:disabled) { opacity: 0.85; }
    .submit-btn:disabled { opacity: 0.35; cursor: not-allowed; }

    .rationale-box { border: 1px solid var(--border-light); border-radius: 8px; overflow: hidden; animation: fadeUp 0.2s ease; }
    .rationale-content { padding: 14px 16px; font-family: var(--serif); font-size: 14.5px; line-height: 1.75; max-height: 220px; overflow-y: auto; }
    .rationale-content p { margin-bottom: 8px; }
    .rationale-content p:last-child { margin-bottom: 0; }
    @keyframes fadeUp { from { opacity:0; transform:translateY(5px); } to { opacity:1; transform:translateY(0); } }
    .rationale-result { padding: 10px 14px; font-size: 13.5px; font-weight: 600; }
    .rationale-result.correct   { color: var(--correct);   background: var(--correct-bg);   border-bottom: 1px solid var(--correct-border); }
    .rationale-result.incorrect { color: var(--incorrect); background: var(--incorrect-bg); border-bottom: 1px solid var(--incorrect-border); }
    .rationale-content { padding: 14px 16px; font-family: var(--serif); font-size: 14.5px; line-height: 1.75; }
    .rationale-content p { margin-bottom: 8px; }
    .rationale-content p:last-child { margin-bottom: 0; }

    /* SPR */
    .spr-wrapper { display: flex; flex-direction: column; gap: 6px; }
    .spr-label { font-size: 13px; color: var(--text-muted); }
    .spr-hint { font-size: 11px; color: var(--text-light); margin-top: 2px; }

    /* BOTTOM BAR */
    .bottombar { height: 52px; display: flex; align-items: center; justify-content: space-between; padding: 0 24px; flex-shrink: 0; position: relative; }
    .bottombar-left { font-size: 13px; color: var(--text-muted); min-width: 80px; }
    .qpill { background: #1a1a1a; color: white; border: none; border-radius: 7px; padding: 8px 18px; font-family: var(--sans); font-size: 13px; font-weight: 500; cursor: pointer; position: absolute; left: 50%; transform: translateX(-50%); }
    .qpill:hover { background: #333; }
    .bottombar-right { display: flex; gap: 8px; min-width: 80px; justify-content: flex-end; }
    .nav-btn { padding: 8px 22px; border-radius: 6px; font-family: var(--sans); font-size: 13px; font-weight: 600; cursor: pointer; border: none; background: #4a7ab5; color: white; transition: opacity 0.15s; }
    .nav-btn:disabled { opacity: 0.3; cursor: not-allowed; }
    .nav-btn:hover:not(:disabled) { opacity: 0.85; }

    /* Q GRID */
    #qlistPopup { display: none; position: fixed; bottom: 60px; left: 50%; transform: translateX(-50%); background: white; border: 1px solid var(--border); border-radius: 12px; box-shadow: 0 8px 40px rgba(0,0,0,0.18); z-index: 200; padding: 16px; min-width: 320px; max-width: 500px; }
    .qpopup-title { font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.6px; color: var(--text-light); margin-bottom: 12px; padding-bottom: 10px; border-bottom: 1px solid var(--border-light); }
    .qgrid { display: flex; flex-direction: column; gap: 0; max-height: 320px; overflow-y: auto; }
    .qgrid-group { margin-bottom: 14px; }
    .qgrid-group-label { font-size: 10.5px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; color: var(--text-light); margin-bottom: 7px; padding-bottom: 5px; border-bottom: 1px solid var(--border-light); }
    .qgrid-group-items { display: flex; flex-wrap: wrap; gap: 9px; }
    .qgrid-item { width: 42px; height: 42px; border-radius: 6px; display: flex; align-items: center; justify-content: center; position: relative; font-size: 13px; font-weight: 600; cursor: pointer; border: 2px solid transparent; transition: all 0.12s; }
    .qgrid-item:hover { opacity: 0.75; transform: scale(1.06); }
    .qgrid-item.unanswered { background: white; color: var(--accent); border-color: var(--accent); }
    .qgrid-item.correct    { background: var(--correct);   color: white; border-color: var(--correct); }
    .qgrid-item.incorrect  { background: var(--incorrect); color: white; border-color: var(--incorrect); }
    .qgrid-item.current    { border-color: var(--accent) !important; box-shadow: 0 0 0 3px rgba(26,58,92,0.35); border-width: 3px !important; }

    /* LOADING */
    .loading-state { display: flex; flex-direction: column; align-items: center; justify-content: center; flex: 1; gap: 14px; color: var(--text-muted); font-size: 14px; }
    .spinner { width: 30px; height: 30px; border: 2.5px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.7s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .error-msg { padding: 24px 32px; color: var(--incorrect); font-size: 14px; }
    #pageLoader { position: fixed; inset: 0; background: white; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 14px; z-index: 999; font-family: var(--sans); font-size: 14px; color: var(--text-muted); }
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #ccc; border-radius: 3px; }

    /* MATH */
    .math-expr    { font-family: var(--serif); font-style: italic; display: inline; white-space: nowrap; }
    .math-var     { font-style: italic; }
    .math-num     { font-style: normal; }
    .math-op      { font-style: normal; padding: 0 0.18em; }
    .math-frac    { display: inline-flex; flex-direction: column; align-items: stretch; vertical-align: middle; font-size: 0.85em; line-height: 1.15; margin: 0 0.15em; }
    .math-frac-n  { border-bottom: 1.2px solid currentColor; padding: 0 4px 1px; text-align: center; white-space: nowrap; }
    .math-frac-d  { padding: 1px 4px 0; text-align: center; white-space: nowrap; }
    .math-sup     { font-size: 0.72em; vertical-align: super; line-height: 0; margin-left: 0.04em; font-style: inherit; display: inline-block; transform: translateY(-0.15em); }
    .math-sup .math-frac { font-size: 0.85em; line-height: 1.15; }
    .math-sub     { font-size: 0.82em; vertical-align: sub; line-height: 0; margin-left: 0.02em; font-style: inherit; }
    .math-sub .math-frac { font-size: 1em; }
    .math-sqrt    { display: inline-flex; align-items: center; }
    .math-sqrt-sym  { font-style: normal; margin-right: 1px; font-size: 1.1em; line-height: 1; }
    .math-sqrt-body { border-top: 1.4px solid currentColor; padding: 0 2px; }
    .math-abs     { font-style: normal; }
    .math-paren   { font-style: normal; }
    .timer-display { display:flex; align-items:center; gap:5px; color:white; font-size:12.5px; font-family:var(--sans); font-weight:500; background:rgba(255,255,255,0.12); border:1px solid rgba(255,255,255,0.2); border-radius:5px; padding:5px 10px; }
    .passage-text p, .passage-text li, .passage-text ul, .passage-text ol { text-align: left !important; }
    .passage-text p:has(svg), .passage-text p:has(img), .passage-text figure { text-align: center !important; }
    .passage-text li { text-align: left !important; display: block; margin-bottom: 0 !important; padding: 0; line-height: 1.6; }
    .passage-text ul, .passage-text ol { margin: 0; padding: 0; list-style: none; }
    .passage-text ul { border: none; }
  </style>
</head>
<body>

<div id="pageLoader"><div class="spinner"></div><span>loading questions…</span></div>

<div class="header">
  <div class="header-left">
    <a href="search.html" class="header-back">← back</a>
    <div style="display:flex;flex-direction:column;gap:1px;">
      <span class="header-section" id="headerSection">SAT</span>
      <span id="headerTopic" style="font-size:11px;color:rgba(255,255,255,0.55);font-family:var(--sans);"></span>
    </div>
  </div>
  <div class="header-right" id="headerRight"></div>
</div>

<hr class="dashed">
<div class="content" id="content"><div class="loading-state"><div class="spinner"></div></div></div>
<hr class="dashed">

<div class="bottombar">
  <div class="bottombar-left">made by tim</div>
  <button class="qpill" id="qPill" onclick="toggleQList()">Question — of — ▾</button>
  <div class="bottombar-right">
    <button class="nav-btn" id="backBtn" onclick="goBack()" disabled>Back</button>
    <button class="nav-btn" id="nextBtn" onclick="goNext()">Next</button>
  </div>
</div>

<div id="qlistPopup">
  <div class="qpopup-title" id="qpopupTitle">questions</div>
  <div style="display:flex;gap:10px;align-items:center;margin-bottom:12px;flex-wrap:wrap;">
    <div style="display:flex;align-items:center;gap:5px;font-size:11px;color:var(--text-muted);font-family:var(--sans);"><div style="width:18px;height:18px;border-radius:4px;background:var(--accent);border:2px solid var(--accent);box-shadow:0 0 0 2px rgba(26,58,92,0.25);"></div>current</div>
    <div style="display:flex;align-items:center;gap:5px;font-size:11px;color:var(--text-muted);font-family:var(--sans);"><div style="width:18px;height:18px;border-radius:4px;background:white;border:2px solid var(--accent);"></div>unanswered</div>
    <div style="display:flex;align-items:center;gap:5px;font-size:11px;color:var(--text-muted);font-family:var(--sans);"><div style="width:18px;height:18px;border-radius:4px;background:var(--correct);border:2px solid var(--correct);"></div>correct</div>
    <div style="display:flex;align-items:center;gap:5px;font-size:11px;color:var(--text-muted);font-family:var(--sans);"><div style="width:18px;height:18px;border-radius:4px;background:var(--incorrect);border:2px solid var(--incorrect);"></div>incorrect</div>
    <div style="display:flex;align-items:center;gap:5px;font-size:11px;color:var(--text-muted);font-family:var(--sans);"><div style="position:relative;width:18px;height:18px;border-radius:4px;background:white;border:2px solid var(--accent);overflow:visible;"><div style="position:absolute;top:-8px;right:-5px;width:14px;height:20px;background:white;padding:0 2px;border-radius:2px 2px 0 0;"><svg viewBox="0 0 24 24" fill="#f5a623" stroke="#e09010" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="width:100%;height:100%;"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg></div></div>for review</div>
  </div>
  <div class="qgrid" id="qgrid"></div>
</div>

<!-- CALCULATOR -->
<div id="calcWidget" style="display:none;position:fixed;bottom:80px;right:24px;width:360px;height:600px;background:white;border-radius:12px;box-shadow:0 8px 40px rgba(0,0,0,0.22);border:1px solid #d0cdc7;z-index:500;flex-direction:column;overflow:hidden;">
  <div id="calcHandle" style="position:relative;background:#1a1a1a;padding:8px 12px;display:flex;align-items:center;justify-content:space-between;cursor:grab;user-select:none;flex-shrink:0;">
    <span style="color:rgba(255,255,255,0.75);font-size:12px;font-weight:500;font-family:var(--sans);">Calculator</span>
    <div style="position:absolute;left:50%;transform:translateX(-50%);display:grid;grid-template-columns:repeat(3,6px);grid-template-rows:repeat(2,6px);gap:3px;pointer-events:none;">
      <div style="width:4px;height:4px;border-radius:50%;background:rgba(255,255,255,0.4);"></div><div style="width:4px;height:4px;border-radius:50%;background:rgba(255,255,255,0.4);"></div><div style="width:4px;height:4px;border-radius:50%;background:rgba(255,255,255,0.4);"></div>
      <div style="width:4px;height:4px;border-radius:50%;background:rgba(255,255,255,0.4);"></div><div style="width:4px;height:4px;border-radius:50%;background:rgba(255,255,255,0.4);"></div><div style="width:4px;height:4px;border-radius:50%;background:rgba(255,255,255,0.4);"></div>
    </div>
    <div style="display:flex;gap:6px;align-items:center;">
      <button id="calcExpandBtn" onclick="expandCalc()" style="background:rgba(255,255,255,0.12);border:none;border-radius:4px;padding:4px 5px;cursor:pointer;display:flex;align-items:center;">
        <svg id="expandIcon" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5"><polyline points="15 3 21 3 21 9"/><polyline points="9 21 3 21 3 15"/><line x1="21" y1="3" x2="14" y2="10"/><line x1="3" y1="21" x2="10" y2="14"/></svg>
      </button>
      <button onclick="toggleCalc()" style="background:rgba(255,255,255,0.12);border:none;border-radius:4px;padding:4px 5px;cursor:pointer;display:flex;align-items:center;">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
  </div>
  <div style="flex:1;overflow:hidden;position:relative;">
    <iframe id="calcFrame" src="https://www.desmos.com/graphing" style="position:absolute;top:-52px;left:0;width:100%;height:calc(100% + 52px);border:none;" title="Calculator"></iframe>
  </div>
</div>

<script>
  const API = 'https://qbank-api.collegeboard.org/msreportingquestionbank-prod/questionbank/digital';
  const LETTERS = ['A','B','C','D','E','F'];
  const DIFF_LABEL = { E:'easy', M:'mid', H:'6-7' };

  const params  = new URLSearchParams(window.location.search);
  const section = params.get('section') || 'math';
  const diffs   = new Set((params.get('diffs')||'').split(',').filter(Boolean));
  const topics  = new Set((params.get('topics')||'').split(',').filter(Boolean));

  let questions=[], currentIdx=0, currentQ=null;
  let submitted=false, selectedChoice=null, loadingQ=false;

  const SESSION_KEY = 'sat_res_'+section;
  const REVIEW_KEY  = 'sat_review_'+section;
  const getReviews   = () => { try { return JSON.parse(sessionStorage.getItem(REVIEW_KEY)||'{}'); } catch { return {}; } };
  const toggleReview = (i) => { const r=getReviews(); r[i]=!r[i]; sessionStorage.setItem(REVIEW_KEY,JSON.stringify(r)); };
  const clearReviews = () => sessionStorage.removeItem(REVIEW_KEY);
  const DEAD_KEY = 'sat_dead';
  const getDead  = () => { try { return new Set(JSON.parse(sessionStorage.getItem(DEAD_KEY)||'[]')); } catch { return new Set(); } };
  const markDead = (id) => { const d=getDead(); d.add(id); sessionStorage.setItem(DEAD_KEY,JSON.stringify([...d])); };
  const clearDead = () => sessionStorage.removeItem(DEAD_KEY);
  const getResults = () => { try { return JSON.parse(sessionStorage.getItem(SESSION_KEY)||'{}'); } catch { return {}; } };
  const saveResult = (i,v) => { const r=getResults(); r[i]=v; sessionStorage.setItem(SESSION_KEY,JSON.stringify(r)); };
  const clearResults = () => sessionStorage.removeItem(SESSION_KEY);

  // ── MATH ────────────────────────────────────────────────────────────────────
  function cleanMathML(str) {
    if (!str) return str;
    return str.replace(/<math([^>]*)>[\s\S]*?<\/math>/gi, (full, attrs) => {
      const m = attrs.match(/alttext="([^"]*)"/i);
      if (m && m[1]) return '<span class="math-expr">'+renderAlttext(m[1])+'</span>';
      return full.replace(/<[^>]+>/g,'').replace(/&lt;/g,'<').replace(/&gt;/g,'>').replace(/&amp;/g,'&').trim();
    });
  }

  function renderAlttext(raw) {
    // upper X → just X (italic variable), e.g. "upper P" → "P"
    raw = raw.replace(/\bupper\s+([A-Z])\b/g, '$1');
    // extra fraction words CB uses
    raw = raw.replace(/\bone twelfth\b/gi, 'StartFraction 1 Over 12 EndFraction');
    raw = raw.replace(/\bone ninth\b/gi, 'StartFraction 1 Over 9 EndFraction');
    raw = raw.replace(/\bone seventh\b/gi, 'StartFraction 1 Over 7 EndFraction');
    raw = raw.replace(/\btwo fifths\b/gi, 'StartFraction 2 Over 5 EndFraction');
    raw = raw.replace(/\bthree fifths\b/gi, 'StartFraction 3 Over 5 EndFraction');
    raw = raw.replace(/\bfour fifths\b/gi, 'StartFraction 4 Over 5 EndFraction');
    raw = raw.replace(/\bthree sevenths\b/gi, 'StartFraction 3 Over 7 EndFraction');
    raw = raw.replace(/\btwo ninths\b/gi, 'StartFraction 2 Over 9 EndFraction');
    // Convert English ordinal fraction phrases
    const ONES = {'zero':0,'one':1,'two':2,'three':3,'four':4,'five':5,'six':6,'seven':7,'eight':8,'nine':9,'ten':10,'eleven':11,'twelve':12,'thirteen':13,'fourteen':14,'fifteen':15,'sixteen':16,'seventeen':17,'eighteen':18,'nineteen':19};
    const TENS = {'twenty':20,'thirty':30,'forty':40,'fifty':50,'sixty':60,'seventy':70,'eighty':80,'ninety':90};
    const ORDINALS = {'first':1,'second':2,'third':3,'fourth':4,'fifth':5,'sixth':6,'seventh':7,'eighth':8,'ninth':9,'tenth':10,'eleventh':11,'twelfth':12,'thirteenth':13,'fourteenth':14,'fifteenth':15,'sixteenth':16,'seventeenth':17,'eighteenth':18,'nineteenth':19,'twentieth':20,'thirtieth':30,'fortieth':40,'fiftieth':50,'sixtieth':60,'seventieth':70,'eightieth':80,'ninetieth':90,'hundredth':100,'thousandth':1000};
    const ORDINAL_TENS = {'twenty':20,'thirty':30,'forty':40,'fifty':50,'sixty':60,'seventy':70,'eighty':80,'ninety':90};

    function wordToNum(word) {
      word = word.toLowerCase();
      if (ONES[word] !== undefined) return ONES[word];
      if (TENS[word] !== undefined) return TENS[word];
      return null;
    }
    function ordinalToNum(word) {
      word = word.toLowerCase();
      if (ORDINALS[word] !== undefined) return ORDINALS[word];
      // "twenty first" style handled separately
      return null;
    }

    // Match patterns like "one eighty fourth", "four twenty firsts", "two thirds" etc.
    // Pattern: (numerator_word(s)) (ordinal_denominator_word(s)) [with optional 's' for plural]
    raw = raw.replace(/\b([a-z]+(?:\s+[a-z]+)?)\s+([a-z]+(?:\s+[a-z]+)?(?:s|th|st|nd|rd)?)\b/gi, (match) => {
      const words = match.toLowerCase().split(/\s+/);
      if (words.length < 2 || words.length > 4) return match;

      // Try to parse numerator (first 1-2 words) and denominator (last 1-2 words)
      for (let split = 1; split < words.length; split++) {
        const numWords = words.slice(0, split);
        const denWords = words.slice(split);

        // Parse numerator
        let num = null;
        if (numWords.length === 1) num = wordToNum(numWords[0]);
        else if (numWords.length === 2) {
          const t = TENS[numWords[0]], o = ONES[numWords[1]];
          if (t && o) num = t + o;
        }

        // Parse denominator (strip plural s if present)
        let den = null;
        let denStr = denWords.join(' ').replace(/s$/i, '');
        if (denWords.length === 1) den = ordinalToNum(denStr);
        else if (denWords.length === 2) {
          // e.g. "twenty first" → 21
          const t = ORDINAL_TENS[denWords[0]];
          const o = ordinalToNum(denWords[1].replace(/s$/i,''));
          if (t && o) den = t + o;
          // e.g. "eighty fourth" → 84
          const t2 = TENS[denWords[0]];
          const o2 = ordinalToNum(denWords[1].replace(/s$/i,''));
          if (t2 && o2) den = t2 + o2;
        }

        if (num !== null && den !== null && den > 0) {
          return `StartFraction ${num} Over ${den} EndFraction`;
        }
      }
      return match;
    });

    return parseMath(tokenizeMath(raw), 0).html;
  }

  function tokenizeMath(str) {
    const P = [
      ['StartFraction','START_FRAC'],['EndFraction','END_FRAC'],['Over','OVER'],
      ['StartAbsoluteValue','START_ABS'],['EndAbsoluteValue','END_ABS'],
      ['StartRoot','START_ROOT'],['EndRoot','END_ROOT'],
      ['Superscript','SUP'],['Subscript','SUB'],['Baseline','BASELINE'],
      ['left parenthesis','LPAREN'],['right parenthesis','RPAREN'],
      ['left bracket','LBRACKET'],['right bracket','RBRACKET'],
      ['left brace','LBRACE'],['right brace','RBRACE'],
      ['plus or minus','OP:±'],
      ['greater than or equal to','OP:≥'],
      ['greater than or equals','OP:≥'],
      ['greater than or equal','OP:≥'],
      ['less than or equal to','OP:≤'],
      ['less than or equals','OP:≤'],
      ['less than or equal','OP:≤'],
      ['not equal to','OP:≠'],
      ['greater than','OP:>'],['less than','OP:<'],['equals','OP:='],
      ['times','OP:×'],['divided by','OP:÷'],['minus','OP:−'],['plus','OP:+'],
      ['negative','NEG'],
      ['one tenth','WFRAC:1:10'],['one half','WFRAC:1:2'],['one third','WFRAC:1:3'],
      ['one fourth','WFRAC:1:4'],['one fifth','WFRAC:1:5'],['one sixth','WFRAC:1:6'],
      ['one seventh','WFRAC:1:7'],['one eighth','WFRAC:1:8'],['one ninth','WFRAC:1:9'],
      ['one twelfth','WFRAC:1:12'],['one hundredth','WFRAC:1:100'],
      ['two thirds','WFRAC:2:3'],['two fifths','WFRAC:2:5'],['two sevenths','WFRAC:2:7'],
      ['three fourths','WFRAC:3:4'],['three fifths','WFRAC:3:5'],['three halves','WFRAC:3:2'],
      ['four fifths','WFRAC:4:5'],['four thirds','WFRAC:4:3'],
      ['five halves','WFRAC:5:2'],['five thirds','WFRAC:5:3'],
      ['pi','VAR:π'],['infinity','VAR:∞'],['theta','VAR:θ'],
      ['alpha','VAR:α'],['beta','VAR:β'],['gamma','VAR:γ'],
      ['delta','VAR:δ'],['sigma','VAR:σ'],
      ['squared','SUP_LIT:2'],['cubed','SUP_LIT:3'],['comma','COMMA'],
    ];
    const BOUNDARY = new Set(['Over','comma','pi','minus','plus','times','equals',
      'negative','squared','cubed','infinity','theta','alpha','beta','gamma','delta','sigma']);

    let s = str.trim().replace(/\s+/g,' ');
    const toks = []; let i = 0;
    outer: while (i < s.length) {
      if (s[i]===' ') { i++; continue; }
      for (const [phrase, type] of P) {
        const len = phrase.length;
        if (s.substr(i,len).toLowerCase() !== phrase.toLowerCase()) continue;
        if (BOUNDARY.has(phrase)) { const a=s[i+len]; if (a!==undefined&&a!==' ') continue; }
        toks.push({type, val:phrase}); i+=len; continue outer;
      }
      const nm = s.substr(i).match(/^-?[0-9]+(?:,[0-9]{3})*(?:\.[0-9]+)?/);
      if (nm) { toks.push({type:'NUM', val:nm[0].replace(/,/g,'')}); i+=nm[0].length; continue; }
      if (/[a-zA-Z]/.test(s[i])) {
        const wm = s.substr(i).match(/^[a-zA-Z]+/);
        toks.push({type: wm[0].length===1?'VAR':'TEXT', val:wm[0]}); i+=wm[0].length; continue;
      }
      toks.push({type:'CHAR', val:s[i]}); i++;
    }
    return toks;
  }

  function parseMath(toks, start, stop) {
    let html='', i=start;
    while (i < toks.length) {
      const t = toks[i];
      if (stop && stop.includes(t.type)) break;
      const STOP_SUP = ['BASELINE','END_FRAC','RPAREN','END_ABS','END_ROOT'];
      if (t.type==='START_FRAC') {
        i++; const nr=parseMath(toks,i,['OVER','END_FRAC']); i=nr.end;
        if (toks[i]&&toks[i].type==='OVER') i++;
        const dr=parseMath(toks,i,['END_FRAC']); i=dr.end;
        if (toks[i]&&toks[i].type==='END_FRAC') i++;
        html+=`<span class="math-frac"><span class="math-frac-n">${nr.html}</span><span class="math-frac-d">${dr.html}</span></span>`; continue;
      }
      if (t.type==='SUP') { i++; const r=parseMath(toks,i,STOP_SUP); i=r.end; if(toks[i]&&toks[i].type==='BASELINE')i++; html+=`<span class="math-sup">${r.html}</span>`; continue; }
      if (t.type==='SUB') { i++; const r=parseMath(toks,i,STOP_SUP); i=r.end; if(toks[i]&&toks[i].type==='BASELINE')i++; html+=`<span class="math-sub">${r.html}</span>`; continue; }
      if (t.type==='START_ABS') { i++; const r=parseMath(toks,i,['END_ABS']); i=r.end; if(toks[i]&&toks[i].type==='END_ABS')i++; html+=`<span class="math-abs">|${r.html}|</span>`; continue; }
      if (t.type==='START_ROOT') { i++; const r=parseMath(toks,i,['END_ROOT']); i=r.end; if(toks[i]&&toks[i].type==='END_ROOT')i++; html+=`<span class="math-sqrt"><span class="math-sqrt-sym">√</span><span class="math-sqrt-body">${r.html}</span></span>`; continue; }
      if (t.type.startsWith('WFRAC:')) { const [,n,d]=t.type.split(':'); html+=`<span class="math-frac"><span class="math-frac-n">${n}</span><span class="math-frac-d">${d}</span></span>`; i++; continue; }
      if (t.type==='SUP_LIT:2') { html+=`<span class="math-sup">2</span>`; i++; continue; }
      if (t.type==='SUP_LIT:3') { html+=`<span class="math-sup">3</span>`; i++; continue; }
      if (t.type==='NEG')      { html+=`<span class="math-op">−</span>`; i++; continue; }
      if (t.type==='LPAREN')   { html+=`<span class="math-paren">(</span>`; i++; continue; }
      if (t.type==='RPAREN')   { html+=`<span class="math-paren">)</span>`; i++; continue; }
      if (t.type==='LBRACKET') { html+=`<span class="math-paren">[</span>`; i++; continue; }
      if (t.type==='RBRACKET') { html+=`<span class="math-paren">]</span>`; i++; continue; }
      if (t.type==='LBRACE')   { html+=`<span class="math-paren">{</span>`; i++; continue; }
      if (t.type==='RBRACE')   { html+=`<span class="math-paren">}</span>`; i++; continue; }
      if (t.type==='COMMA')    { html+=`,`; i++; continue; }
      if (t.type==='VAR')      { html+=`<span class="math-var">${t.val}</span>`; i++; continue; }
      if (t.type==='NUM')      { html+=`<span class="math-num">${t.val}</span>`; i++; continue; }
      if (t.type==='TEXT')     { html+=`<span class="math-var">${t.val}</span>`; i++; continue; }
      if (t.type==='CHAR')     { html+=t.val; i++; continue; }
      if (t.type.startsWith('OP:'))  { html+=`<span class="math-op">${t.type.slice(3)}</span>`; i++; continue; }
      if (t.type.startsWith('VAR:')) { html+=`<span class="math-var">${t.type.slice(4)}</span>`; i++; continue; }
      if (t.type.startsWith('NUM:')) { html+=`<span class="math-num">${t.type.slice(4)}</span>`; i++; continue; }
      break;
    }
    return {html, end:i};
  }

  function cleanBlanks(str) {
    if (!str) return str;
    str = cleanMathML(str);

    // strip sr-only spans
    str = str.replace(/<span[^>]*class="[^"]*sr-only[^"]*"[^>]*>[\s\S]*?<\/span>/gi, '');
    // strip sr-only and graph description elements — use greedy match to handle nesting
    str = str.replace(/<div[^>]*(?:class="[^"]*sr-only[^"]*"|role="region")[^>]*>[\s\S]*?<\/div>/gi, '');
    str = str.replace(/<[a-z]+[^>]*class="[^"]*sr-only[^"]*"[^>]*>[\s\S]*?<\/[a-z]+>/gi, '');
    // strip empty aria-hidden spacers
    str = str.replace(/<[a-z]+[^>]*aria-hidden="true"[^>]*>\s*<\/[a-z]+>/gi, '');
    // aria-hidden underscore blank lines
    str = str.replace(/<span[^>]*aria-hidden="true"[^>]*>_{3,}<\/span>/gi,
      '<span style="display:inline-block;min-width:60px;border-bottom:1.7px solid currentColor;vertical-align:+0.5em;margin:0 2px;">&nbsp;</span>');
    str = str.replace(/_{3,}/g,
      '<span style="display:inline-block;min-width:60px;border-bottom:1.7px solid currentColor;vertical-align:+0.5em;margin:0 2px;">&nbsp;</span>');

    // upper prefix in italic tags: <i>upperP</i> → <i>P</i>
    str = str.replace(/<i>upper([A-Za-z])<\/i>/gi, '<i>$1</i>');
    // upper prefix plain text: upperP → italic P
    str = str.replace(/\bupper([A-Za-z])\b/g, '<span style="font-style:italic;">$1</span>');

    // (X comma Y) → (X, Y)
    str = str.replace(/\(\s*([^)]*?)\s+comma\s+([^)]*?)\s*\)/gi, (m,a,b) => `(${a.trim()}, ${b.trim()})`);
    str = str.replace(/\bcomma\b/gi, ',');

    // strip inline text-align:center from text elements (CSS handles alignment)
    str = str.replace(/(<(?:p|li|ul|ol|div|span)[^>]*?)style="([^"]*?)\btext-align\s*:\s*center\b[^"]*?"([^>]*?>)/gi,
      (m, open, s, close) => m.includes('figure') || m.includes('image') ? m : `${open}${close}`);

    return str;
  }

  function formatSPRPreview(val) {
    let s = val.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    // a^(b/c)
    s = s.replace(/([A-Za-z0-9.]+)\^\(([^)]+)\)/g, (m,base,exp) => {
      const fe = exp.replace(/(-?[A-Za-z0-9.]+)\/(-?[A-Za-z0-9.]+)/g,
        (_,n,d) => `<span class="math-frac" style="font-size:0.65em;"><span class="math-frac-n">${n}</span><span class="math-frac-d">${d}</span></span>`);
      return `${base}<span class="math-sup">${fe}</span>`;
    });
    // a^b
    s = s.replace(/([A-Za-z0-9.]+)\^([A-Za-z0-9.]+)/g, (m,b,e) => `${b}<span class="math-sup">${e}</span>`);
    // a/b — supports expressions in parens like x/(2x+3) or (x+1)/(x-1)
    s = s.replace(/(\([\s\S]*?\)|[A-Za-z0-9.]+)\/(\([\s\S]*?\)|[A-Za-z0-9.]+)/g,
      (m,n,d) => {
        // strip outer parens for display
        const nd = n.replace(/^\(|\)$/g,'');
        const dd = d.replace(/^\(|\)$/g,'');
        return `<span class="math-frac"><span class="math-frac-n">${nd}</span><span class="math-frac-d">${dd}</span></span>`;
      });
    return s;
  }

  // ── BOOT ────────────────────────────────────────────────────────────────────
  async function boot() {
    const isMath = section==='math';
    document.getElementById('headerSection').textContent = isMath ? 'SAT — Math' : 'SAT — Reading & Writing';
    const clearBtn = `<button class="calc-btn" onclick="clearAllReviews()">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/><line x1="18" y1="6" x2="6" y2="18" stroke-width="2"/></svg>
      clear reviews</button>`;
    const timerBtn=`<div class="timer-display"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg><span id="timerDisplay">0:00</span></div>`;
    document.getElementById('headerRight').innerHTML = timerBtn + clearBtn + (isMath ? `
      <button class="calc-btn" onclick="toggleCalc()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="3" width="20" height="18" rx="2"/><line x1="8" y1="9" x2="16" y2="9"/><line x1="8" y1="13" x2="16" y2="13"/><line x1="8" y1="17" x2="12" y2="17"/></svg>
        calculator</button>` : '');
    try {
      const test = isMath ? 2 : 1;
      let all = (await Promise.all([...topics].map(domain =>
        fetch(`${API}/get-questions`,{method:'POST',headers:{'Content-Type':'application/json'},
          body:JSON.stringify({asmtEventId:99,test,domain})}).then(r=>r.json())
      ))).flat();
      if (diffs.size>0) all = all.filter(q=>diffs.has(q.difficulty));
      questions = all.sort((a,b)=>(a.external_id||'').localeCompare(b.external_id||''));

      const filterKey = section+'|'+[...diffs].sort().join(',')+'|'+[...topics].sort().join(',');
      if (sessionStorage.getItem('sat_filter')!==filterKey) {
        clearResults(); clearReviews(); clearDead();
        sessionStorage.removeItem('sat_last_idx');
        sessionStorage.setItem('sat_filter',filterKey);
      }
      questions = questions.filter(q=>!getDead().has(q.external_id));
      if (!questions.length) { showEmpty(); return; }

      document.querySelector('#pageLoader span').textContent='checking questions…';
      const results = await Promise.allSettled(questions.map(q=>
        fetch(`${API}/get-question`,{method:'POST',headers:{'Content-Type':'application/json'},
          body:JSON.stringify({external_id:q.external_id})}).then(r=>r.json())
      ));
      const valid=[];
      results.forEach((res,i)=>{
        if (res.status==='rejected'){markDead(questions[i].external_id);return;}
        const d=res.value;
        if (!((d.answerOptions&&d.answerOptions.length)||d.type==='spr'||d.stem||d.stimulus)){markDead(questions[i].external_id);return;}
        questions[i]._cached=d; valid.push(questions[i]);
      });
      questions=valid;
      if (!questions.length){showEmpty();return;}

      const so=[],sg={};
      questions.forEach(q=>{const sk=q.skill_desc||q.skillDesc||'other';if(!sg[sk]){sg[sk]=[];so.push(sk);}sg[sk].push(q);});
      questions=so.reduce((a,sk)=>a.concat(sg[sk]),[]);

      document.getElementById('pageLoader').remove();
      renderGrid();
      const si=parseInt(sessionStorage.getItem('sat_last_idx')||'0');
      await loadQuestion(si<questions.length?si:0);
    } catch(err){
      document.getElementById('pageLoader').remove();
      document.getElementById('content').innerHTML=`<div class="error-msg">failed to load: ${err.message}. <a href="search.html">go back</a></div>`;
    }
  }

  function showEmpty(){
    document.getElementById('pageLoader').remove();
    document.getElementById('content').innerHTML='<div class="error-msg">no questions found. <a href="search.html">go back</a></div>';
  }

  async function loadQuestion(idx) {
    if (loadingQ) return;
    loadingQ=true; currentIdx=idx; submitted=false; selectedChoice=null; currentQ=null;
    updateNavBtns(); updateQPill(); renderGrid();
    document.getElementById('content').innerHTML='<div class="loading-state"><div class="spinner"></div><span>loading…</span></div>';
    try {
      let data=questions[idx]._cached;
      if (!data){
        const r=await fetch(`${API}/get-question`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({external_id:questions[idx].external_id})});
        data=await r.json();
      }
      if ((!data.answerOptions||!data.answerOptions.length)&&data.type!=='spr'){
        const uid=questions[idx].uId||questions[idx].uid;
        if (uid&&uid!==questions[idx].external_id){
          try{const r2=await fetch(`${API}/get-question`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({external_id:uid})});const d2=await r2.json();if(d2.answerOptions&&d2.answerOptions.length)data=d2;}catch{}
        }
      }
      if ((!data.stem&&!data.stimulus)&&(!data.answerOptions||!data.answerOptions.length)&&data.type!=='spr'){skipQ(idx);return;}
      currentQ=data; renderQuestion();
    } catch{ skipQ(idx); return; }
    loadingQ=false;
  }

  function skipQ(idx){
    markDead(questions[idx].external_id); questions.splice(idx,1); loadingQ=false;
    updateQPill(); renderGrid();
    if (questions.length>0) loadQuestion(Math.min(idx,questions.length-1));
  }

  function renderQuestion() {
    const meta=questions[currentIdx], q=currentQ;
    if (!q) return;
    startTimer();
    const el=document.getElementById('headerTopic'); if(el) el.textContent=meta.skill_desc||'';

    const isSPR=q.type==='spr', opts=q.answerOptions||[];
    const stimulus=q.stimulus||'', stem=q.stem||'';
    const stemPlain=stem.replace(/<[^>]+>/g,'').trim();
    const hasSVG=stem.includes('<svg');
    const hasStim=!!stimulus, twoPanel=hasStim||hasSVG||stemPlain.length>140;

    const content=document.getElementById('content'); content.innerHTML='';
    const res=getResults(), prev=res[currentIdx];
    const qboxBg=prev==='correct'?'var(--correct)':prev==='incorrect'?'var(--incorrect)':'var(--accent)';
    const marked=getReviews()[currentIdx];

    const qbar=document.createElement('div'); qbar.className='qnum-bar';
    qbar.innerHTML=`
      <div class="qnum-left">
        <div class="qnum-box" id="qnumBox" style="background:${qboxBg}">${currentIdx+1}</div>
        <div class="mark-review${marked?' marked':''}" id="markReviewBtn" onclick="handleMarkReview()">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="${marked?'#f5a623':'none'}" stroke="${marked?'#f5a623':'currentColor'}" stroke-width="2.5"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg>
          ${marked?'marked for review':'mark for review'}
        </div>
      </div>
      <div style="display:flex;align-items:center;gap:8px;">
        <span class="diff-badge diff-${meta.difficulty}">${DIFF_LABEL[meta.difficulty]||meta.difficulty}</span>
        <span class="topic-tag">${meta.skill_desc||''}</span>
      </div>`;

    const body=document.createElement('div');
    body.className='question-body'+(twoPanel?'':' centered');
    const aa=document.createElement('div');
    aa.className='action-area'+(twoPanel?'':' centered');
    aa.id='actionArea';

    if (twoPanel) {
      const left=document.createElement('div'); left.className='passage-panel';
      left.innerHTML=`<div class="passage-text">${cleanBlanks(hasStim?stimulus:stem)}</div>`;
      // remove sr-only and graph description elements from rendered DOM
      left.querySelectorAll('[class*="sr-only"],[role="region"],[aria-label*="Long description"]').forEach(el=>el.remove());
      if (hasStim&&stem){const se=document.createElement('div');se.className='question-stem';se.innerHTML=cleanBlanks(stem);body.appendChild(se);}
      buildChoices(isSPR,opts,body,aa,false);
      const right=document.createElement('div'); right.className='question-panel';
      right.appendChild(qbar); right.appendChild(body); right.appendChild(aa);
      content.appendChild(left); content.appendChild(right);
    } else {
      // inline qnum bar flows with centered content
      qbar.classList.add('inline');
      body.appendChild(qbar);
      if (stem){
        const se=document.createElement('div');se.className='question-stem';se.innerHTML=cleanBlanks(stem);
        se.querySelectorAll('[class*="sr-only"],[role="region"],[aria-label*="Long description"]').forEach(el=>el.remove());
        body.appendChild(se);
      }
      buildChoices(isSPR,opts,body,aa,true);
      const right=document.createElement('div'); right.className='question-panel single';
      right.appendChild(body); right.appendChild(aa);
      content.appendChild(right);
    }
  }

  function buildChoices(isSPR, opts, body, aa, centered) {
    if (isSPR) {
      const wrap=document.createElement('div'); wrap.className='spr-wrapper';
      wrap.innerHTML=`
        <div class="spr-label">enter your answer</div>
        <input id="sprInput" type="text" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false"
          style="width:100%;padding:10px 14px;border:1.5px solid var(--border);border-radius:6px;font-family:var(--serif);font-size:15px;outline:none;" placeholder="your answer…">
        <div style="margin-top:6px;padding:8px 12px;background:#f7f6f3;border-radius:6px;border:1px solid var(--border-light);">
          <div style="font-size:11px;color:var(--text-light);font-weight:600;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:4px;">your answer will display as</div>
          <div id="sprPreview" style="font-family:var(--serif);font-size:15px;color:var(--text);min-height:22px;">&nbsp;</div>
        </div>
        <div class="spr-hint">^ for exponents &nbsp;·&nbsp; / for fractions &nbsp;·&nbsp; e.g.
          <code style="font-size:11px;background:#ece9e2;padding:1px 4px;border-radius:3px;">x^2</code>
          <code style="font-size:11px;background:#ece9e2;padding:1px 4px;border-radius:3px;">3/4</code></div>`;
      body.appendChild(wrap);
      aa.innerHTML=`<button class="submit-btn" id="submitBtn" onclick="submitSPR()" disabled style="${centered?'align-self:center':'align-self:flex-end'}">Submit</button>`;
      setTimeout(()=>{
        const inp=document.getElementById('sprInput');
        const pre=document.getElementById('sprPreview');
        const sb=document.getElementById('submitBtn');
        if(!inp||!pre) return;
        inp.addEventListener('input',()=>{
          const v=inp.value.trim();
          pre.innerHTML=v?formatSPRPreview(inp.value):'&nbsp;';
          if(sb) sb.disabled=!v;
        });
      },0);
    } else if (!opts.length) {
      const d=document.createElement('div');
      d.style.cssText='font-size:13px;color:var(--text-muted);padding:12px 0;';
      d.textContent='this question could not be loaded. press next to continue.';
      body.appendChild(d);
    } else {
      const list=document.createElement('div'); list.className='choices-list';
      opts.forEach((opt,i)=>{
        const el=document.createElement('div'); el.className='choice'; el.id=`c-${i}`; el.dataset.optId=opt.id;
        const letter=document.createElement('div'); letter.className='choice-letter'; letter.id=`cl-${i}`; letter.textContent=LETTERS[i]||i;
        const text=document.createElement('div'); text.className='choice-text'; text.innerHTML=cleanBlanks(opt.content||'');
        const xb=document.createElement('button'); xb.className='cross-btn'; xb.title='cross out'; xb.textContent='✕';
        xb.onclick=e=>{
          e.stopPropagation(); if(submitted) return;
          el.classList.toggle('crossed');
          if(el.classList.contains('crossed')&&el.classList.contains('selected')){
            el.classList.remove('selected'); selectedChoice=null;
            const sb=document.getElementById('submitBtn'); if(sb) sb.disabled=true;
          }
        };
        el.onclick=()=>pickChoice(i);
        el.appendChild(letter); el.appendChild(text); el.appendChild(xb);
        list.appendChild(el);
      });
      body.appendChild(list);
      aa.innerHTML=`<button class="submit-btn" id="submitBtn" onclick="submitAnswer()" disabled style="${centered?'align-self:center':'align-self:flex-end'}">Submit</button>`;
    }
  }

  function pickChoice(i) {
    if (submitted) return;
    const el=document.getElementById(`c-${i}`);
    if (!el||el.classList.contains('crossed')) return;
    selectedChoice=i;
    document.querySelectorAll('.choice').forEach((e,j)=>e.classList.toggle('selected',j===i));
    const sb=document.getElementById('submitBtn'); if(sb)sb.disabled=false;
  }

  function showResult(isCorrect, rationaleHTML) {
    saveResult(currentIdx,isCorrect?'correct':'incorrect'); renderGrid();
    const box=document.getElementById('qnumBox');
    if(box)box.style.background=isCorrect?'var(--correct)':'var(--incorrect)';
    const aa=document.getElementById('actionArea');
        aa.innerHTML=`
      <div class="rationale-box">
        <div class="rationale-result ${isCorrect?'correct':'incorrect'}">${isCorrect?'✓ correct':'✗ incorrect'}</div>
        <div class="rationale-content">${rationaleHTML}</div>
      </div>
      ${!isCorrect?`<button class="retry-btn" onclick="retryQuestion()">↺ try again</button>`:''}`;
  }

  function retryQuestion() {
    submitted=false; selectedChoice=null;
    const box=document.getElementById('qnumBox'); if(box)box.style.background='var(--accent)';
    const r=getResults(); delete r[currentIdx]; sessionStorage.setItem(SESSION_KEY,JSON.stringify(r));
    renderGrid();
    // fully re-render the question to reset everything cleanly
    renderQuestion();
  }

  function submitAnswer() {
    if(selectedChoice===null||submitted)return; submitted=true;
    stopTimer();
    const opts=currentQ.answerOptions||[], cids=new Set(currentQ.keys||[]), cset=new Set();
    opts.forEach((o,i)=>{if(cids.has(o.id))cset.add(i);});
    const ok=cset.has(selectedChoice);
    document.querySelectorAll('.choice').forEach((el,i)=>{
      el.classList.add('disabled'); el.classList.remove('selected','crossed');
      if(cset.has(i))el.classList.add('correct');
      else if(i===selectedChoice)el.classList.add('incorrect');
    });
    showResult(ok, cleanBlanks(currentQ.rationale||'<p>no explanation available.</p>'));
  }

  function submitSPR() {
    const inp=document.getElementById('sprInput'); if(!inp||submitted)return; submitted=true;
    stopTimer();
    const val=inp.value.trim(), cids=new Set((currentQ.keys||[]).map(String)), ok=cids.has(val);
    inp.disabled=true;
    inp.style.borderColor=ok?'var(--correct-border)':'var(--incorrect-border)';
    inp.style.background=ok?'var(--correct-bg)':'var(--incorrect-bg)';
    const note=ok?'':`<p style="margin-top:8px;color:var(--text-muted);font-size:13px;">correct answer: <strong>${[...cids].join(' or ')}</strong></p>`;
    showResult(ok, cleanBlanks(currentQ.rationale||'<p>no explanation available.</p>')+note);
  }

  function goBack(){if(currentIdx>0){stopTimer();loadQuestion(currentIdx-1);}}
  function goNext(){if(currentIdx<questions.length-1){stopTimer();loadQuestion(currentIdx+1);}}
  function updateNavBtns(){
    document.getElementById('backBtn').disabled=currentIdx===0;
    document.getElementById('nextBtn').disabled=currentIdx===questions.length-1;
  }
  function updateQPill(){
    document.getElementById('qPill').textContent=`Question ${currentIdx+1} of ${questions.length} ▾`;
    sessionStorage.setItem('sat_last_idx',currentIdx);
  }

  function renderGrid(){
    const grid=document.getElementById('qgrid'), res=getResults(), rev=getReviews();
    document.getElementById('qpopupTitle').textContent=`questions — ${Object.keys(res).length} answered of ${questions.length}`;
    grid.innerHTML='';
    const gs={},go=[];
    questions.forEach((q,i)=>{
      const sk=q.skill_desc||q.skillDesc||'other';
      if(!gs[sk]){gs[sk]=[];go.push(sk);}
      gs[sk].push({q,i});
    });
    go.forEach(sk=>{
      const g=document.createElement('div'); g.className='qgrid-group';
      const l=document.createElement('div'); l.className='qgrid-group-label'; l.textContent=sk;
      g.appendChild(l);
      const it=document.createElement('div'); it.className='qgrid-group-items';
      gs[sk].forEach(({q,i})=>{
        const el=document.createElement('div');
        const r=res[i];
        let cls='qgrid-item '+(r==='correct'?'correct':r==='incorrect'?'incorrect':'unanswered');
        if(i===currentIdx) cls+=' current';
        if(rev[i]) cls+=' review';
        el.className=cls;
        el.textContent=i+1;
        el.title=sk;
        if(rev[i]){
          const bm=document.createElement('div');
          bm.style.cssText='position:absolute;top:-10px;right:-8px;width:20px;height:28px;background:transparent;padding:0 2px;border-radius:4px 4px 0 0;';
          bm.innerHTML=`<svg viewBox="0 0 24 24" fill="#f5a623" stroke="#e09010" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="width:100%;height:100%;"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg>`;
          el.appendChild(bm);
        }
        el.onclick=()=>{toggleQList();stopTimer();loadQuestion(i);};
        it.appendChild(el);
      });
      g.appendChild(it);
      grid.appendChild(g);
    });
  }

  let qlistOpen=false;
  function toggleQList(){
    qlistOpen=!qlistOpen;
    document.getElementById('qlistPopup').style.display=qlistOpen?'block':'none';
    if(qlistOpen)renderGrid();
  }
  document.addEventListener('click',e=>{
    if(qlistOpen&&!e.target.closest('#qlistPopup')&&!e.target.closest('#qPill')){qlistOpen=false;document.getElementById('qlistPopup').style.display='none';}
  });

  function handleMarkReview(){
    toggleReview(currentIdx);
    const m=getReviews()[currentIdx], btn=document.getElementById('markReviewBtn');
    if(btn){
      btn.className=m?'mark-review marked':'mark-review';
      btn.innerHTML=`<svg width="18" height="18" viewBox="0 0 24 24" fill="${m?'#f5a623':'none'}" stroke="${m?'#f5a623':'currentColor'}" stroke-width="2.5"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg> ${m?'marked for review':'mark for review'}`;
    }
    renderGrid();
  }

  function clearAllReviews(){
    clearReviews();
    const btn=document.getElementById('markReviewBtn');
    if(btn){btn.className='mark-review';btn.innerHTML=`<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg> mark for review`;}
    renderGrid();
  }

  let calcOpen=false, calcExpanded=false;
  function toggleCalc(){calcOpen=!calcOpen;document.getElementById('calcWidget').style.display=calcOpen?'flex':'none';}
  function expandCalc(){
    calcExpanded=!calcExpanded;
    const w=document.getElementById('calcWidget'),ic=document.getElementById('expandIcon');
    if(calcExpanded){w.style.width='800px';w.style.height='670px';ic.innerHTML=`<polyline points="4 14 10 14 10 20"/><polyline points="20 10 14 10 14 4"/><line x1="10" y1="14" x2="3" y2="21"/><line x1="21" y1="3" x2="14" y2="10"/>`;}
    else{w.style.width='360px';w.style.height='600px';ic.innerHTML=`<polyline points="15 3 21 3 21 9"/><polyline points="9 21 3 21 3 15"/><line x1="21" y1="3" x2="14" y2="10"/><line x1="3" y1="21" x2="10" y2="14"/>`;}
  }

  document.addEventListener('DOMContentLoaded',()=>{
    const h=document.getElementById('calcHandle'),w=document.getElementById('calcWidget');
    if(!h||!w)return;
    let drag=false,ox=0,oy=0;
    h.addEventListener('mousedown',e=>{if(e.target.closest('button'))return;drag=true;const r=w.getBoundingClientRect();ox=e.clientX-r.left;oy=e.clientY-r.top;h.style.cursor='grabbing';e.preventDefault();});
    document.addEventListener('mousemove',e=>{if(!drag)return;const x=Math.max(0,Math.min(window.innerWidth-w.offsetWidth,e.clientX-ox));const y=Math.max(0,Math.min(window.innerHeight-w.offsetHeight,e.clientY-oy));w.style.right='auto';w.style.bottom='auto';w.style.left=x+'px';w.style.top=y+'px';});
    document.addEventListener('mouseup',()=>{drag=false;h.style.cursor='grab';});
  });

    // ── TIMER ───────────────────────────────────────────────────────────────────
  let timerSeconds=0, timerInterval=null;

  function startTimer() {
    timerSeconds=0;
    clearInterval(timerInterval);
    updateTimerDisplay();
    timerInterval=setInterval(()=>{
      timerSeconds++;
      updateTimerDisplay();
    },1000);
  }

  function updateTimerDisplay() {
    const el=document.getElementById('timerDisplay');
    if(!el) return;
    const m=Math.floor(timerSeconds/60);
    const s=timerSeconds%60;
    el.textContent=`${m}:${s.toString().padStart(2,'0')}`;
  }

  function stopTimer() { clearInterval(timerInterval); }
  boot();
</script>
</body>
</html>
