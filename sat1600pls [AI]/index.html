<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>tim is tuff</title>
  <link rel="icon" type="image/png" href="MYsatlogo.png">
  <link rel="stylesheet" href="style.css">
  <style>
    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: var(--bg);
      gap: 0;
    }
    .intro-card {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 18px;
      text-align: center;
    }
    .intro-logo {
      width: 180px;
      height: 180px;
      border-radius: 20px;
      object-fit: cover;
      box-shadow: 0 8px 32px rgba(0,0,0,0.13);
    }
    .intro-welcome {
      font-family: var(--serif);
      font-size: 32px;
      font-weight: 600;
      color: var(--accent);
      letter-spacing: -0.5px;
      line-height: 1.2;
    }
    .intro-sub {
      font-family: var(--sans);
      font-size: 14px;
      color: var(--text-muted);
      letter-spacing: 0.2px;
    }
    .start-btn {
      margin-top: 8px;
      padding: 12px 40px;
      background: var(--accent);
      color: white;
      border: none;
      border-radius: 8px;
      font-family: var(--sans);
      font-size: 15px;
      font-weight: 500;
      cursor: pointer;
      text-decoration: none;
      transition: opacity 0.15s, transform 0.15s;
      display: inline-block;
    }
    .start-btn:hover {
      opacity: 0.85;
      transform: translateY(-1px);
    }
  </style>
</head>
<body>
  <div class="intro-card">
    <img src="MYsatlogo.png" alt="logo" class="intro-logo">
    <div class="intro-welcome">welcome.</div>
    <div class="intro-sub">made by tim</div>
    <a href="search.html" class="start-btn">click to lock in</a>
  </div>
</body>
</html>
